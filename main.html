<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Style Music Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body, html{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
}

.background-blur{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#000;
  background-size:cover;
  background-position:center;
  filter:blur(25px);
  z-index:0;
  transition:background-image 0.5s ease;
}

.player-card{
  position:relative;
  z-index:1;
  width:320px;
  height:440px;
  max-width:95vw;
  background:rgba(26,26,26,0.9);
  border-radius:25px;
  padding:20px;
  box-sizing:border-box;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition: all 0.5s ease;
  transform: translateZ(-50px);
}

.album-art{
  width:240px;
  height:240px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:0 8px 25px rgba(0,0,0,0.7);
  margin-bottom:15px;
  flex-shrink:0;
}

.track-title{
  margin:12px 0 4px;
  font-size:20px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  width:100%;
}

.track-title span{
  display:inline-block;
}

.track-title.scroll span{
  padding-left:100%;
  animation:scrollTitle 10s linear infinite;
}

@keyframes scrollTitle{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

.track-artist{
  margin:0;
  font-size:14px;
  color:rgba(255,255,255,0.8);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  width:100%;
}

.time-row{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:white;
  margin-top:10px;
  width:100%;
}

.progress-container{
  width:100%;
  margin-top:4px;
}

.progress-bar{
  width:100%;
  -webkit-appearance:none;
  height:4px;
  border-radius:4px;
  background:linear-gradient(to right,#fff 0%,rgba(255,255,255,0.25) 0%);
  cursor:pointer;
}

.progress-bar::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:12px;
  height:12px;
  border-radius:50%;
  background:white;
  cursor:pointer;
}

.controls{
  margin-top:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
}

.controls button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.controls .play{
  font-size:34px;
}

.controls .prev,
.controls .next{
  font-size:22px;
}

input[type=file]{display:none;}

.uploads{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:8px;
  z-index:2;
}

.upload-btn{
  color:white;
  font-size:10px;
  padding:4px 8px;
  background:rgba(255,255,255,0.15);
  border-radius:7px;
  cursor:pointer;
}

#shapeToggleBtn{
  position:fixed;
  top:10px;
  right:10px;
  padding:6px 10px;
  font-size:11px;
  background:rgba(255,255,255,0.15);
  color:white;
  border-radius:7px;
  cursor:pointer;
  z-index:2;
}

/* rectangle mode */
.player-card.rectangle{
  flex-direction:row;
  width:580px;
  height:220px;
  text-align:left;
  align-items:center;
  gap:20px;
  margin:0 auto;
  transform: translateZ(-50px);
}

.player-card.rectangle .album-art{
  width:150px;
  height:150px;
  margin:0;
  flex-shrink:0;
}

.player-card.rectangle #trackInfo{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  margin-left:15px;
  max-width: calc(100% - 150px - 35px); /* keep inside rectangle */
}

.player-card.rectangle .controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px; /* evenly spaced icons */
  margin-top:12px;
  max-width:100%; /* constrain inside trackInfo */
  box-sizing:border-box;
  flex-wrap:nowrap;
}
</style>
</head>

<body>

<div class="background-blur" id="background"></div>

<div class="uploads">
  <label class="upload-btn" for="audioInput">🎵 MP3</label>
  <label class="upload-btn" for="imageInput">🖼️ Cover</label>
</div>

<button id="shapeToggleBtn">Rectangle</button>

<div class="player-card" id="playerCard">
  <img id="albumArt" class="album-art" src="">
  <div id="trackInfo">
    <p class="track-title" id="songName"><span>Track Title</span></p>
    <p class="track-artist" id="artistName">Unknown Artist</p>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>

    <div class="progress-container">
      <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0">
    </div>

    <div class="controls">
      <button class="prev"><i class="fas fa-backward"></i></button>
      <button class="play" id="playBtn"><i class="fas fa-play"></i></button>
      <button class="next"><i class="fas fa-forward"></i></button>
    </div>
  </div>
</div>

<input type="file" id="audioInput" accept=".mp3">
<input type="file" id="imageInput" accept="image/*">

<audio id="audio" loop></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progressBar = document.getElementById("progressBar");
const currentTime = document.getElementById("currentTime");
const totalTime = document.getElementById("totalTime");
const albumArt = document.getElementById("albumArt");
const songName = document.getElementById("songName");
const artistName = document.getElementById("artistName");
const playerCard = document.getElementById("playerCard");
const toggleBtn = document.getElementById("shapeToggleBtn");
const background = document.getElementById("background");

let isRectangle = false;
let isDragging = false;

playBtn.disabled = true;
playBtn.style.opacity = "0.5";

function checkTitleScroll() {
  const span = songName.querySelector("span");
  if(span.scrollWidth > songName.clientWidth){
    songName.classList.add("scroll");
  } else {
    songName.classList.remove("scroll");
  }
}

toggleBtn.onclick = () => {
  playerCard.classList.toggle("rectangle");
  isRectangle = !isRectangle;
  toggleBtn.textContent = isRectangle ? "Square" : "Rectangle";
}

playBtn.onclick = () => {
  if(!audio.src) return;
  if(audio.paused){
    audio.play();
    playBtn.innerHTML='<i class="fas fa-pause"></i>';
  } else {
    audio.pause();
    playBtn.innerHTML='<i class="fas fa-play"></i>';
  }
}

function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60);
  return `${m}:${s<10?'0'+s:s}`;
}

audio.addEventListener("timeupdate", () => {
  if(audio.duration && !isDragging){
    const percent = (audio.currentTime/audio.duration)*100;
    progressBar.value = percent;
    progressBar.style.background = `linear-gradient(to right, white ${percent}%, rgba(255,255,255,0.25) ${percent}%)`;
    currentTime.textContent = formatTime(audio.currentTime);
    totalTime.textContent = formatTime(audio.duration);
  }
});

// pause audio while dragging progress
progressBar.addEventListener("mousedown", () => { isDragging = true; audio.pause(); });
progressBar.addEventListener("mouseup", () => { isDragging = false; audio.play(); });
progressBar.addEventListener("input", () => {
  if(audio.duration){
    const percent = progressBar.value;
    audio.currentTime = (percent/100)*audio.duration;
    progressBar.style.background = `linear-gradient(to right, white ${percent}%, rgba(255,255,255,0.25) ${percent}%)`;
  }
});

document.getElementById("audioInput").onchange = function(e){
  const file = e.target.files[0];
  if(file){
    playBtn.disabled=false;
    playBtn.style.opacity="1";
    audio.src = URL.createObjectURL(file);

    const nameParts = file.name.replace(".mp3","").split(" - ");
    const title = nameParts[0] || "Track Title";
    songName.innerHTML="<span>"+title+"</span>";

    const artist = nameParts[1] || "Unknown Artist";
    artistName.textContent = artist.length>30 ? artist.substring(0,30)+'…' : artist;

    setTimeout(checkTitleScroll,100);

    audio.addEventListener("loadedmetadata", ()=>{
      totalTime.textContent=formatTime(audio.duration);
      audio.play();
      playBtn.innerHTML='<i class="fas fa-pause"></i>';
    });
  }
}

document.getElementById("imageInput").onchange = function(e){
  const file = e.target.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    albumArt.src = url;
    background.style.backgroundImage = `url(${url})`;
  }
}

document.querySelector(".prev").onclick = ()=>{ audio.currentTime=0; }
document.querySelector(".next").onclick = ()=>{ audio.currentTime=audio.duration; }
</script>

</body>
  </html>
